name: Dashboard Payload Check

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic to test"
        required: false
        default: "AI agents"
      app_module:
        description: "FastAPI app module (main12:app or mainResearch:app)"
        required: false
        default: "main12:app"

jobs:
  validate-dashboard-payload:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
      RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
      RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          chmod +x ./run_dashboard_check.sh

      - name: Validate required secrets
        run: |
          missing=0
          for v in GOOGLE_API_KEY YOUTUBE_API_KEY SERPAPI_API_KEY GROQ_API_KEY OPENROUTER_API_KEY SUPABASE_URL SUPABASE_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run strict dashboard payload check
        run: |
          APP_MODULE="${{ github.event.inputs.app_module || 'main12:app' }}" \
          ./run_dashboard_check.sh "${{ github.event.inputs.topic || 'AI agents' }}"
